<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書つくるくん</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #fafaf8;
    --accent: #c0392b;
    --accent-light: #e74c3c;
    --border: #e0ddd8;
    --muted: #8a8780;
    --field-bg: #ffffff;
    --section-bg: #f5f4f0;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
    --radius: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #eae8e3;
    color: var(--ink);
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ── */
  .app-header {
    background: var(--ink);
    color: white;
    padding: 20px 0;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .app-header p {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  /* ── Layout ── */
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  .section {
    background: var(--paper);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  /* ── Form Elements ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 4px;
    letter-spacing: 0.03em;
  }
  .form-group input, .form-group textarea, .form-group select {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--field-bg);
    color: var(--ink);
    transition: border-color 0.2s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    outline: none;
    border-color: var(--accent);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-group textarea::placeholder { color: #ccc; }

  /* ── Items Table ── */
  .items-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .items-table th {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-align: left;
    padding: 6px 8px;
    border-bottom: 2px solid var(--border);
  }
  .items-table th:nth-child(3),
  .items-table th:nth-child(4),
  .items-table th:nth-child(5) { text-align: right; }
  .items-table td { padding: 4px; }
  .items-table td input {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    width: 100%;
    background: var(--field-bg);
  }
  .items-table td input:focus { outline: none; border-color: var(--accent); }
  .items-table .num-input { text-align: right; }
  .items-table .subtotal {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    text-align: right;
    padding: 6px 8px;
    color: var(--ink);
    font-weight: 500;
  }
  .btn-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .btn-remove:hover { color: var(--accent); background: rgba(192,57,43,0.08); }

  .btn-add {
    margin-top: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    background: var(--section-bg);
    border: 1px dashed var(--border);
    border-radius: 4px;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Totals ── */
  .totals-bar {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }
  .totals-box { min-width: 260px; }
  .totals-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
  }
  .totals-row.grand {
    border-top: 2px solid var(--ink);
    margin-top: 4px;
    padding-top: 10px;
    font-size: 18px;
    font-weight: 700;
  }
  .totals-row .amount {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
  }
  .totals-row.grand .amount { color: var(--accent); }

  .tax-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
  }
  .tax-toggle select {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--field-bg);
  }

  /* ── Action Buttons ── */
  .actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .btn-primary, .btn-secondary {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 12px 32px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    letter-spacing: 0.04em;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-light); transform: translateY(-1px); }
  .btn-secondary {
    background: var(--ink);
    color: white;
  }
  .btn-secondary:hover { opacity: 0.85; transform: translateY(-1px); }

  /* ── Print Styles ── */
  @media print {
    body { background: white; }
    .app-header, .actions, .btn-add, .btn-remove, .no-print, .tax-toggle { display: none !important; }
    .container { padding: 0; max-width: 100%; }
    .section { box-shadow: none; border: none; padding: 16px 0; }
    .items-table td input {
      border: none;
      padding: 4px 0;
      background: transparent;
    }
    .form-group input, .form-group textarea, .form-group select {
      border: none;
      padding: 2px 0;
      background: transparent;
    }
    .form-group label { color: var(--ink); }
    .items-table th { color: var(--ink); }
    .items-table td::before { color: var(--ink); }
    @page { margin: 15mm; }
  }

  /* ── Preview Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    overflow-y: auto;
  }
  .modal-overlay.active { display: flex; }
  .modal-content {
    background: white;
    border-radius: 8px;
    padding: 48px;
    max-width: 800px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    margin: 24px 0;
  }
  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: var(--muted);
    z-index: 10;
  }
  .modal-close:hover { color: var(--ink); }
  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 32px;
  }

  /* ── Invoice Preview Styles ── */
  .inv-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; }
  .inv-title { font-size: 32px; font-weight: 700; letter-spacing: 0.12em; color: var(--ink); }
  .inv-meta { text-align: right; font-size: 13px; color: var(--ink); line-height: 1.8; }
  .inv-parties { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 32px; }
  .inv-party-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink); margin-bottom: 4px; }
  .inv-party-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .inv-party-detail { font-size: 13px; color: var(--ink); line-height: 1.7; }
  .inv-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  .inv-table th {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--ink); text-align: left;
    padding: 8px 12px; border-bottom: 2px solid var(--ink);
  }
  .inv-table th:nth-child(n+3) { text-align: right; }
  .inv-table td { padding: 10px 12px; font-size: 14px; border-bottom: 1px solid var(--border); }
  .inv-table td:nth-child(n+3) { text-align: right; font-family: 'Noto Sans JP', sans-serif; font-size: 13px; }
  .inv-totals { display: flex; justify-content: flex-end; }
  .inv-totals-box { min-width: 240px; }
  .inv-totals-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .inv-totals-row .val { font-family: 'Noto Sans JP', sans-serif; }
  .inv-totals-row.grand { border-top: 2px solid var(--ink); margin-top: 6px; padding-top: 8px; font-size: 20px; font-weight: 700; }
  .inv-totals-row.grand .val { color: var(--ink); }
  .inv-notes { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--ink); }
  /* ── Responsive ── */
  @media (max-width: 640px) {
    .form-grid, .form-grid.three { grid-template-columns: 1fr; }
    .inv-parties { grid-template-columns: 1fr; gap: 20px; }
    .modal-content { padding: 24px 16px; }

    /* ── Mobile card layout for items table ── */
    .items-table { font-size: 14px; }
    .items-table thead { display: none; }
    .items-table, .items-table tbody { display: block; }
    .items-table tbody tr {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 4px 8px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .items-table td { padding: 2px 0; }
    .items-table td::before {
      content: attr(data-label);
      display: block;
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 2px;
      letter-spacing: 0.03em;
    }
    .items-table td:nth-child(1) { grid-column: 1 / -1; padding-right: 36px; }
    .items-table td:nth-child(5) { grid-column: 1 / -1; text-align: left; }
    .items-table td:nth-child(6) {
      position: absolute;
      top: 10px;
      right: -4px;
    }
    .items-table td:nth-child(6)::before { display: none; }
    .items-table td input { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app-header">
  <h1>請求書つくるくん</h1>
  <p>ブラウザで完結・PDF出力対応の請求書ジェネレーター</p>
</div>

<div class="container">

  <!-- 請求書情報 -->
  <div class="section">
    <div class="section-title">請求書情報</div>
    <div class="form-grid three">
      <div class="form-group">
        <label>請求書番号</label>
        <input type="text" id="invoiceNo">
      </div>
      <div class="form-group">
        <label>発行日</label>
        <input type="date" id="issueDate">
      </div>
      <div class="form-group">
        <label>支払期限</label>
        <input type="date" id="dueDate">
      </div>
    </div>
    <div class="form-group" style="margin-top:8px;">
      <label>件名（任意）</label>
      <input type="text" id="invoiceTitle">
    </div>
  </div>

  <!-- 請求元 -->
  <div class="section">
    <div class="section-title">請求元</div>
    <div class="form-grid">
      <div class="form-group">
        <label>会社名 / 氏名</label>
        <input type="text" id="fromName">
      </div>
      <div class="form-group full">
        <label>住所</label>
        <input type="text" id="fromAddress">
      </div>
      <div class="form-group">
        <label>電話番号</label>
        <input type="text" id="fromTel">
      </div>
      <div class="form-group">
        <label>メール</label>
        <input type="email" id="fromEmail">
      </div>
      <div class="form-group">
        <label>登録番号（インボイス）</label>
        <input type="text" id="fromRegNo">
      </div>
    </div>
  </div>

  <!-- 請求先 -->
  <div class="section">
    <div class="section-title">請求先</div>
    <div class="form-grid">
      <div class="form-group">
        <label>会社名 / 氏名</label>
        <input type="text" id="toName" value="ウェルズ株式会社">
      </div>
      <div class="form-group">
        <label>担当者</label>
        <input type="text" id="toPerson" value="代表取締役 鶴岡 貴子">
      </div>
      <div class="form-group full">
        <label>住所</label>
        <input type="text" id="toAddress" value="〒248-0014 神奈川県鎌倉市由比ガ浜4-3-10-1">
      </div>
    </div>
  </div>

  <!-- 明細 -->
  <div class="section">
    <div class="section-title">明細項目</div>
    <table class="items-table">
      <thead>
        <tr>
          <th style="width:40%">品目・内容</th>
          <th style="width:15%">数量</th>
          <th style="width:10%">単位</th>
          <th style="width:18%" id="unitPriceHeader">単価（税抜）</th>
          <th style="width:15%">金額</th>
          <th style="width:2%"></th>
        </tr>
      </thead>
      <tbody id="itemsBody"></tbody>
    </table>
    <button class="btn-add" onclick="addItem()">＋ 行を追加</button>

    <div class="tax-toggle no-print">
      <label>税計算:</label>
      <select id="taxMode" onchange="onTaxModeChange()">
        <option value="exclusive" selected>税別</option>
        <option value="inclusive">税込</option>
      </select>
      <label>消費税率:</label>
      <select id="taxRate" onchange="recalc()">
        <option value="0.10" selected>10%</option>
        <option value="0.08">8%（軽減税率）</option>
        <option value="0">なし</option>
      </select>
    </div>

    <div class="totals-bar">
      <div class="totals-box">
        <div class="totals-row" id="subtotalRow"><span id="subtotalLabel">小計</span><span class="amount" id="subtotalDisplay">¥0</span></div>
        <div class="totals-row" id="taxRow"><span id="taxLabel">消費税</span><span class="amount" id="taxDisplay">¥0</span></div>
        <div class="totals-row grand"><span id="totalLabel">合計</span><span class="amount" id="totalDisplay">¥0</span></div>
      </div>
    </div>
  </div>

  <!-- 備考 -->
  <div class="section">
    <div class="section-title">備考・振込先</div>
    <div class="form-group">
      <textarea id="notes" rows="4" placeholder="お振込先：&#10;○○銀行 △△支店 普通 1234567&#10;口座名義：カ）サンプル"></textarea>
    </div>
  </div>

  <!-- アクション -->
  <div class="actions no-print">
    <button class="btn-primary" onclick="showPreview()">プレビュー / 印刷</button>
    <button class="btn-secondary" onclick="resetForm()">リセット</button>
  </div>
</div>

<!-- Preview Modal -->
<div class="modal-overlay" id="previewModal">
  <div class="modal-content" id="previewContent">
    <button class="modal-close" onclick="closePreview()">✕</button>
    <div id="previewBody"></div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="printInvoice()">PDF / 印刷</button>
      <button class="btn-secondary" onclick="closePreview()">閉じる</button>
    </div>
  </div>
</div>

<script>
  let itemId = 0;

  // ── Auto-save ──
  const SAVE_KEY = 'invoiceAutoSave';

  function debounce(fn, ms) {
    let timer;
    return function() { clearTimeout(timer); timer = setTimeout(fn, ms); };
  }

  function saveData() {
    const items = [];
    document.querySelectorAll('#itemsBody tr').forEach(row => {
      const inputs = row.querySelectorAll('input');
      items.push({
        description: inputs[0].value,
        quantity: inputs[1].value,
        unit: inputs[2].value,
        unitPrice: inputs[3].value
      });
    });
    const data = {
      from: {
        name: document.getElementById('fromName').value,
        address: document.getElementById('fromAddress').value,
        tel: document.getElementById('fromTel').value,
        email: document.getElementById('fromEmail').value,
        regNo: document.getElementById('fromRegNo').value
      },
      to: {
        name: document.getElementById('toName').value,
        person: document.getElementById('toPerson').value,
        address: document.getElementById('toAddress').value
      },
      items: items,
      taxRate: document.getElementById('taxRate').value,
      taxMode: document.getElementById('taxMode').value,
      notes: document.getElementById('notes').value,
      invoiceTitle: document.getElementById('invoiceTitle').value
    };
    try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  function loadData() {
    let data;
    try { data = JSON.parse(localStorage.getItem(SAVE_KEY)); } catch(e) {}
    if (!data) { addItem(); return; }

    // 請求元
    if (data.from) {
      document.getElementById('fromName').value = data.from.name || '';
      document.getElementById('fromAddress').value = data.from.address || '';
      document.getElementById('fromTel').value = data.from.tel || '';
      document.getElementById('fromEmail').value = data.from.email || '';
      document.getElementById('fromRegNo').value = data.from.regNo || '';
    }
    // 請求先
    if (data.to) {
      document.getElementById('toName').value = data.to.name || '';
      document.getElementById('toPerson').value = data.to.person || '';
      document.getElementById('toAddress').value = data.to.address || '';
    }
    // 明細項目
    document.getElementById('itemsBody').innerHTML = '';
    if (data.items && data.items.length > 0) {
      data.items.forEach(item => {
        addItem();
        const row = document.getElementById('itemsBody').lastElementChild;
        const inputs = row.querySelectorAll('input');
        inputs[0].value = item.description || '';
        inputs[1].value = item.quantity || '1';
        inputs[2].value = item.unit || '式';
        inputs[3].value = item.unitPrice || '0';
      });
    } else {
      addItem();
    }
    // 税率・税モード
    if (data.taxRate) document.getElementById('taxRate').value = data.taxRate;
    if (data.taxMode) {
      document.getElementById('taxMode').value = data.taxMode;
      onTaxModeChange();
    }
    // 備考
    if (data.notes !== undefined) document.getElementById('notes').value = data.notes;
    // 件名
    if (data.invoiceTitle) document.getElementById('invoiceTitle').value = data.invoiceTitle;

    recalc();
  }

  const debouncedSave = debounce(saveData, 500);

  function generateInvoiceId() {
    const chars = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ';
    const bytes = new Uint8Array(6);
    crypto.getRandomValues(bytes);
    return 'INV-' + Array.from(bytes).map(b => chars[b % chars.length]).join('');
  }

  // Set invoice number
  document.getElementById('invoiceNo').value = generateInvoiceId();

  // Set today's date
  const today = new Date();
  document.getElementById('issueDate').value = formatDate(today);
  const due = new Date(today);
  due.setDate(due.getDate() + 30);
  document.getElementById('dueDate').value = formatDate(due);

  function formatDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function formatDateJP(str) {
    if (!str) return '';
    const [y, m, d] = str.split('-');
    return `${y}年${parseInt(m)}月${parseInt(d)}日`;
  }

  function formatYen(n) {
    return '¥' + Math.round(n).toLocaleString('ja-JP');
  }

  function addItem() {
    itemId++;
    const priceLabel = getTaxMode() === 'inclusive' ? '単価（税込）' : '単価（税抜）';
    const tr = document.createElement('tr');
    tr.id = 'item-' + itemId;
    tr.innerHTML = `
      <td data-label="品目・内容"><input type="text" oninput="recalc()"></td>
      <td data-label="数量"><input type="number" class="num-input" value="1" min="0" oninput="recalc()"></td>
      <td data-label="単位"><input type="text" value="式" style="text-align:center"></td>
      <td data-label="${priceLabel}"><input type="text" class="num-input" value="0" oninput="recalc()"></td>
      <td class="subtotal" data-label="金額">¥0</td>
      <td><button class="btn-remove" onclick="removeItem(${itemId})">×</button></td>
    `;
    document.getElementById('itemsBody').appendChild(tr);
    recalc();
    debouncedSave();
  }

  function removeItem(id) {
    const row = document.getElementById('item-' + id);
    if (row) row.remove();
    recalc();
    debouncedSave();
  }

  function getTaxMode() {
    return document.getElementById('taxMode').value;
  }

  function onTaxModeChange() {
    const mode = getTaxMode();
    // Update column header
    document.getElementById('unitPriceHeader').textContent = mode === 'inclusive' ? '単価（税込）' : '単価（税抜）';
    // Update mobile data-label on all rows
    document.querySelectorAll('#itemsBody tr').forEach(row => {
      const priceTd = row.querySelectorAll('td')[3];
      if (priceTd) priceTd.setAttribute('data-label', mode === 'inclusive' ? '単価（税込）' : '単価（税抜）');
    });
    recalc();
    debouncedSave();
  }

  function recalc() {
    const taxMode = getTaxMode();
    let lineSum = 0;
    const rows = document.querySelectorAll('#itemsBody tr');
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const qty = parseFloat(inputs[1].value) || 0;
      const price = parseFloat(inputs[3].value) || 0;
      const lineTotal = qty * price;
      row.querySelector('.subtotal').textContent = formatYen(lineTotal);
      lineSum += lineTotal;
    });

    const taxRate = parseFloat(document.getElementById('taxRate').value);

    let subtotal, tax, total;
    if (taxMode === 'inclusive') {
      // 税込: 入力価格は税込、税額を逆算
      total = lineSum;
      tax = total - total / (1 + taxRate);
      subtotal = total - tax;
    } else {
      // 税別: 入力価格は税抜、税額を加算
      subtotal = lineSum;
      tax = subtotal * taxRate;
      total = subtotal + tax;
    }

    // ラベル更新
    if (taxMode === 'inclusive') {
      document.getElementById('subtotalRow').style.display = 'none';
      document.getElementById('taxLabel').textContent = 'うち消費税';
      document.getElementById('totalLabel').textContent = '合計（税込）';
    } else {
      document.getElementById('subtotalRow').style.display = '';
      document.getElementById('taxLabel').textContent = '消費税';
      document.getElementById('totalLabel').textContent = '合計';
    }

    document.getElementById('subtotalDisplay').textContent = formatYen(subtotal);
    document.getElementById('taxDisplay').textContent = formatYen(tax);
    document.getElementById('totalDisplay').textContent = formatYen(total);
  }

  function showPreview() {
    const fromName = document.getElementById('fromName').value || '（未入力）';
    const fromAddress = document.getElementById('fromAddress').value;
    const fromTel = document.getElementById('fromTel').value;
    const fromEmail = document.getElementById('fromEmail').value;
    const fromRegNo = document.getElementById('fromRegNo').value;
    const toName = document.getElementById('toName').value || '（未入力）';
    const toPerson = document.getElementById('toPerson').value;
    const toAddress = document.getElementById('toAddress').value;
    const invoiceNo = document.getElementById('invoiceNo').value;
    const issueDate = document.getElementById('issueDate').value;
    const dueDate = document.getElementById('dueDate').value;
    const invoiceTitle = document.getElementById('invoiceTitle').value;
    const notes = document.getElementById('notes').value;
    const taxRate = parseFloat(document.getElementById('taxRate').value);
    const taxMode = getTaxMode();

    let lineSum = 0;
    let itemsHTML = '';
    const unitPriceLabel = taxMode === 'inclusive' ? '単価（税込）' : '単価（税抜）';
    const rows = document.querySelectorAll('#itemsBody tr');
    rows.forEach(row => {
      const inputs = row.querySelectorAll('input');
      const name = inputs[0].value || '—';
      const qty = parseFloat(inputs[1].value) || 0;
      const unit = inputs[2].value || '';
      const price = parseFloat(inputs[3].value) || 0;
      const lineTotal = qty * price;
      lineSum += lineTotal;
      itemsHTML += `<tr>
        <td>${name}</td>
        <td>${qty}</td>
        <td>${unit}</td>
        <td>${formatYen(price)}</td>
        <td>${formatYen(lineTotal)}</td>
      </tr>`;
    });

    let subtotal, tax, total;
    if (taxMode === 'inclusive') {
      total = lineSum;
      tax = total - total / (1 + taxRate);
      subtotal = total - tax;
    } else {
      subtotal = lineSum;
      tax = subtotal * taxRate;
      total = subtotal + tax;
    }
    const taxLabel = taxRate === 0.10 ? '10%' : taxRate === 0.08 ? '8%' : '0%';

    let fromDetails = '';
    if (fromAddress) fromDetails += fromAddress + '<br>';
    if (fromTel) fromDetails += 'TEL: ' + fromTel + '<br>';
    if (fromEmail) fromDetails += fromEmail + '<br>';
    if (fromRegNo) fromDetails += '登録番号: ' + fromRegNo;

    let toDetails = '';
    if (toAddress) toDetails += toAddress + '<br>';
    if (toPerson) toDetails += toPerson + ' 様';

    // 税込モードの場合、合計行の表示を変える
    let totalsHTML;
    if (taxMode === 'inclusive') {
      totalsHTML = `
        <div class="inv-totals-row grand"><span>合計（税込）</span><span class="val">${formatYen(total)}</span></div>
        <div class="inv-totals-row"><span>うち消費税（${taxLabel}）</span><span class="val">${formatYen(tax)}</span></div>
      `;
    } else {
      totalsHTML = `
        <div class="inv-totals-row"><span>小計</span><span class="val">${formatYen(subtotal)}</span></div>
        <div class="inv-totals-row"><span>消費税（${taxLabel}）</span><span class="val">${formatYen(tax)}</span></div>
        <div class="inv-totals-row grand"><span>合計</span><span class="val">${formatYen(total)}</span></div>
      `;
    }

    const html = `
      <div class="inv-header">
        <div>
          <div class="inv-title">請 求 書</div>
          ${invoiceTitle ? `<div style="font-size:13px; margin-top:4px; color:var(--ink);">${invoiceTitle}</div>` : ''}
        </div>
        <div class="inv-meta">
          No. ${invoiceNo}<br>
          発行日: ${formatDateJP(issueDate)}<br>
          支払期限: ${formatDateJP(dueDate)}
        </div>
      </div>

      <div class="inv-parties">
        <div>
          <div class="inv-party-label">請求先</div>
          <div class="inv-party-name">${toName} 御中</div>
          <div class="inv-party-detail">${toDetails}</div>
        </div>
        <div style="text-align:right;">
          <div class="inv-party-label">請求元</div>
          <div class="inv-party-name">${fromName}</div>
          <div class="inv-party-detail">${fromDetails}</div>
        </div>
      </div>

      <div style="font-size:16px; margin-bottom:24px; font-weight:600;">
        ご請求金額: <span style="font-size:24px; color:var(--ink); font-family:'Noto Sans JP',sans-serif;">${formatYen(total)}</span>
        <span style="font-size:13px; font-weight:400; color:var(--ink);">（税込）</span>
      </div>

      <table class="inv-table">
        <thead><tr><th>品目</th><th>数量</th><th>単位</th><th>${unitPriceLabel}</th><th>金額</th></tr></thead>
        <tbody>${itemsHTML}</tbody>
      </table>

      <div class="inv-totals">
        <div class="inv-totals-box">
          ${totalsHTML}
        </div>
      </div>

      ${notes ? `<div class="inv-notes"><strong>備考</strong><br><pre style="font-family:inherit; white-space:pre-wrap; margin-top:4px;">${notes}</pre></div>` : ''}
    `;

    document.getElementById('previewBody').innerHTML = html;
    document.getElementById('previewModal').classList.add('active');
  }

  function closePreview() {
    document.getElementById('previewModal').classList.remove('active');
  }

  function printInvoice() {
    const content = document.getElementById('previewBody').innerHTML;

    // Build PDF filename: YYMMDD_請求書ID_請求元名前_請求額
    const issueDate = document.getElementById('issueDate').value; // YYYY-MM-DD
    const invoiceNo = document.getElementById('invoiceNo').value;
    const fromName = document.getElementById('fromName').value || '未入力';
    let lineSum = 0;
    document.querySelectorAll('#itemsBody tr').forEach(row => {
      const inputs = row.querySelectorAll('input');
      const qty = parseFloat(inputs[1].value) || 0;
      const price = parseFloat(inputs[3].value) || 0;
      lineSum += qty * price;
    });
    const taxRate = parseFloat(document.getElementById('taxRate').value);
    const taxMode = getTaxMode();
    const total = taxMode === 'inclusive' ? Math.round(lineSum) : Math.round(lineSum + lineSum * taxRate);
    const yymmdd = issueDate ? issueDate.slice(2).replace(/-/g, '') : '000000';
    const pdfTitle = `${yymmdd}_${invoiceNo}_${fromName}_${total}円`;

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
      <title>${pdfTitle}</title>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
      <style>
        :root { --ink:#1a1a2e; --accent:#1a1a2e; --border:#e0ddd8; --muted:#1a1a2e; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Noto Sans JP',sans-serif; padding:40px; color:var(--ink); line-height:1.6; }
        .inv-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:32px; }
        .inv-title { font-size:32px; font-weight:700; letter-spacing:0.12em; color:var(--ink); }
        .inv-meta { text-align:right; font-size:13px; color:var(--muted); line-height:1.8; }
        .inv-parties { display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-bottom:32px; }
        .inv-party-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); margin-bottom:4px; }
        .inv-party-name { font-size:16px; font-weight:600; margin-bottom:4px; }
        .inv-party-detail { font-size:13px; color:var(--ink); line-height:1.7; }
        .inv-table { width:100%; border-collapse:collapse; margin-bottom:24px; }
        .inv-table th { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); text-align:left; padding:8px 12px; border-bottom:2px solid var(--ink); }
        .inv-table th:nth-child(n+3) { text-align:right; }
        .inv-table td { padding:10px 12px; font-size:14px; border-bottom:1px solid var(--border); }
        .inv-table td:nth-child(n+3) { text-align:right; font-family:'Noto Sans JP',sans-serif; font-size:13px; }
        .inv-totals { display:flex; justify-content:flex-end; }
        .inv-totals-box { min-width:240px; }
        .inv-totals-row { display:flex; justify-content:space-between; padding:4px 0; font-size:14px; }
        .inv-totals-row .val { font-family:'Noto Sans JP',sans-serif; }
        .inv-totals-row.grand { border-top:2px solid var(--ink); margin-top:6px; padding-top:8px; font-size:20px; font-weight:700; }
        .inv-totals-row.grand .val { color:var(--ink); }
        .inv-notes { margin-top:32px; padding-top:16px; border-top:1px solid var(--border); font-size:13px; color:var(--muted); }
        @page { margin:15mm; }
      </style></head><body>${content}</body></html>`);
    win.document.close();
    setTimeout(() => { win.print(); }, 500);
  }

  function resetForm() {
    if (!confirm('入力内容をすべてリセットしますか？')) return;
    localStorage.removeItem(SAVE_KEY);
    document.querySelectorAll('input[type="text"], input[type="email"], textarea').forEach(el => el.value = '');
    document.getElementById('invoiceNo').value = generateInvoiceId();
    document.getElementById('issueDate').value = formatDate(new Date());
    const d = new Date(); d.setDate(d.getDate()+30);
    document.getElementById('dueDate').value = formatDate(d);
    document.getElementById('taxRate').value = '0.10';
    document.getElementById('taxMode').value = 'exclusive';
    onTaxModeChange();
    // 請求先のデフォルト値を復元
    document.getElementById('toName').value = 'ウェルズ株式会社';
    document.getElementById('toPerson').value = '代表取締役 鶴岡 貴子';
    document.getElementById('toAddress').value = '〒248-0014 神奈川県鎌倉市由比ガ浜4-3-10-1';
    document.getElementById('itemsBody').innerHTML = '';
    addItem();
  }

  // Init: restore saved data or start with one empty row
  loadData();

  // ── Auto-save event listeners ──
  ['fromName','fromAddress','fromTel','fromEmail','fromRegNo',
   'toName','toPerson','toAddress','notes','invoiceTitle'].forEach(id => {
    document.getElementById(id).addEventListener('input', debouncedSave);
  });
  document.getElementById('taxRate').addEventListener('change', debouncedSave);
  document.getElementById('taxMode').addEventListener('change', debouncedSave);
  document.getElementById('itemsBody').addEventListener('input', debouncedSave);
</script>
